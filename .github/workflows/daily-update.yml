name: Daily Subsidy Update

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        id: scrape
        run: python scraper.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subsidy_data.json index.html update_log.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Tokyo date +'%Y-%m-%d')
            if [ "${{ steps.scrape.outputs.has_diff }}" = "true" ]; then
              MSG="🔔 ${DATE}: 補助金情報に更新あり（新規:${{ steps.scrape.outputs.added_count }} 変更:${{ steps.scrape.outputs.changed_count }} 削除:${{ steps.scrape.outputs.removed_count }}）"
            else
              MSG="📅 ${DATE}: 定期更新（差分なし）"
            fi
            git commit -m "${MSG}"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
